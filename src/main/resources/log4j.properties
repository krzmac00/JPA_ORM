# Root logger configuration
rootLogger.level=DEBUG
rootLogger.appenderRefs=stdout
rootLogger.appenderRef.stdout.ref=ConsoleAppender

# Console appender
appender.console.type=Console
appender.console.name=ConsoleAppender
appender.console.target=SYSTEM_OUT
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# Logger for org.hibernate.SQL
logger.org.hibernate.SQL.name=org.hibernate.SQL
logger.org.hibernate.SQL.level=DEBUG
logger.org.hibernate.SQL.appenderRefs=stdout
logger.org.hibernate.SQL.appenderRef.stdout.ref=ConsoleAppender

# Logger for org.hibernate.type
logger.org.hibernate.type.name=org.hibernate.type
logger.org.hibernate.type.level=TRACE
logger.org.hibernate.type.appenderRefs=stdout
logger.org.hibernate.type.appenderRef.stdout.ref=ConsoleAppender

# Logger for org
logger.org.name=org
logger.org.level=INFO
logger.org.appenderRefs=stdout
logger.org.appenderRef.stdout.ref=ConsoleAppender